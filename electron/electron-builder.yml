appId: com.encounty.app
productName: Encounty
artifactName: "Encounty.${ext}"
icon: ../frontend/public/app-icon.png
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
extraResources:
  - from: ../frontend/public/app-icon.png
    to: app-icon.png
  - from: build/icon.icns
    to: icon.icns
    filter: icon.icns
  - from: ../frontend/dist
    to: frontend-dist
  - from: ../encounty-backend-linux
    to: encounty-backend-linux
    filter: encounty-backend-linux
  - from: ../encounty-backend-windows.exe
    to: encounty-backend-windows.exe
    filter: encounty-backend-windows.exe
  - from: ../encounty-backend-darwin
    to: encounty-backend-darwin
    filter: encounty-backend-darwin
publish:
  provider: github
  owner: ZSleyer
  repo: Encounty
  releaseType: release
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
win:
  target:
    - target: portable
      arch:
        - x64
mac:
  target:
    - target: zip
      arch:
        - arm64
  category: public.app-category.utilities
  icon: build/icon.icns
  identity: null
  extendInfo:
    NSScreenCaptureUsageDescription: "Encounty needs screen recording access to detect shiny Pokémon via template matching."
    NSCameraUsageDescription: "Encounty needs camera access to capture your game screen for auto-detection."
    NSMicrophoneUsageDescription: "Encounty may request microphone access as part of media capture."
