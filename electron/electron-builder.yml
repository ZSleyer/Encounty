appId: com.encounty.app
productName: Encounty
artifactName: "Encounty-${arch}.${ext}"
icon: ../frontend/public/app-icon.png
# Swaps the arch-correct Go backend into resources for the Windows arm64 pack, so both
# Windows arches can be built in one invocation and share a single auto-update feed.
afterPack: build/after-pack.js
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
extraResources:
  - from: ../frontend/public/app-icon.png
    to: app-icon.png
  - from: ../frontend/dist
    to: frontend-dist
publish:
  provider: github
  owner: ZSleyer
  repo: Encounty
  releaseType: release
linux:
  # No arch listed on purpose: the packaging arch is driven per invocation via the
  # electron-builder CLI flag (--x64 / --arm64). A configured arch here would be
  # additive to the CLI flag and produce both arches sharing one sidecar binary.
  target:
    - target: AppImage
  category: Utility
  extraResources:
    - from: ../encounty-backend-linux
      to: encounty-backend-linux
  icon: ../frontend/public/app-icon.png
win:
  # Windows ships one universal build per target that carries both x64 and arm64 and
  # picks the arch at install time. Both arches are packaged in a single invocation
  # (see the afterPack hook for the per-arch backend swap); omitting ${arch} from the
  # name keeps electron-builder from also emitting redundant per-arch installers.
  artifactName: "Encounty.${ext}"
  target:
    - target: nsis
    - target: portable
  extraResources:
    - from: ../encounty-backend-windows.exe
      to: encounty-backend-windows.exe
  icon: ../frontend/public/app-icon.png
nsis:
  # Distinct name so the installer does not collide with the portable Encounty.exe.
  artifactName: "Encounty-Setup.${ext}"
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  # Keep hunts and config across updates.
  deleteAppDataOnUninstall: false
mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.utilities
  icon: build/icon.icns
  identity: null
  extraResources:
    - from: ../encounty-backend-darwin
      to: encounty-backend-darwin
    - from: build/icon.icns
      to: icon.icns
  extendInfo:
    NSScreenCaptureUsageDescription: "Encounty needs screen recording access to detect shiny Pokémon via template matching."
    NSCameraUsageDescription: "Encounty needs camera access to capture your game screen for auto-detection."
    NSMicrophoneUsageDescription: "Encounty may request microphone access as part of media capture."
