appId: com.encounty.app
productName: Encounty
artifactName: "Encounty.${ext}"
icon: ../frontend/public/app-icon.png
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
extraResources:
  - from: ../frontend/public/app-icon.png
    to: app-icon.png
  - from: ../frontend/dist
    to: frontend-dist
  - from: ../encounty-backend-linux
    to: encounty-backend-linux
    filter: encounty-backend-linux
  - from: ../encounty-backend-windows.exe
    to: encounty-backend-windows.exe
    filter: encounty-backend-windows.exe
  - from: ../capture-sidecar/target/release/encounty-capture
    to: encounty-capture
    filter: encounty-capture
  - from: ../capture-sidecar/target/x86_64-pc-windows-gnu/release/encounty-capture.exe
    to: encounty-capture.exe
    filter: encounty-capture.exe
publish:
  provider: github
  owner: ZSleyer
  repo: Encounty
  releaseType: release
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
win:
  target:
    - target: portable
      arch:
        - x64
