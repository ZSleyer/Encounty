host: localhost:8080
info:
  contact: {}
  description: Pokémon Shiny Encounter Counter — REST API
  title: Encounty API
  version: "1.0"
paths:
  /backgrounds/{filename}:
    delete:
      parameters:
      - description: Image filename
        in: path
        name: filename
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a background image
      tags:
      - backgrounds
    get:
      parameters:
      - description: Image filename
        in: path
        name: filename
        required: true
        type: string
      produces:
      - image/png
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
      summary: Serve a background image
      tags:
      - backgrounds
  /backgrounds/upload:
    post:
      consumes:
      - application/json
      parameters:
      - description: Base64-encoded image
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_server.BackgroundUploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_server.FilenameResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Upload a background image
      tags:
      - backgrounds
  /backup:
    get:
      produces:
      - application/zip
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Download a backup ZIP
      tags:
      - system
  /detector/{id}/config:
    get:
      consumes:
      - application/json
      parameters:
      - description: Pokemon ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.DetectorConfig'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_server.errResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_server.errResp'
      summary: Get or set detector config for a Pokemon
      tags:
      - detector
    post:
      consumes:
      - application/json
      parameters:
      - description: Pokemon ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.DetectorConfig'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_server.errResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_server.errResp'
      summary: Get or set detector config for a Pokemon
      tags:
      - detector
  /detector/{id}/export_templates:
    get:
      parameters:
      - description: Pokemon ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_server.errResp'
      summary: Export templates as ZIP
      tags:
      - detector
  /detector/{id}/import_templates:
    post:
      consumes:
      - application/json
      parameters:
      - description: Target Pokemon ID
        in: path
        name: id
        required: true
        type: string
      - description: Source Pokemon ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_server.ImportTemplatesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_server.ImportResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_server.errResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_server.errResp'
      summary: Import templates from another Pokemon
      tags:
      - detector
  /detector/{id}/import_templates_file:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Pokemon ID
        in: path
        name: id
        required: true
        type: string
      - description: Template ZIP file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_server.ImportResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_server.errResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_server.errResp'
      summary: Import templates from uploaded ZIP
      tags:
      - detector
  /detector/{id}/match_frame:
    post:
      consumes:
      - image/jpeg
      parameters:
      - description: Pokemon ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_server.MatchFrameResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_server.errResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_server.errResp'
      summary: Submit a browser-captured frame for matching
      tags:
      - detector
  /detector/{id}/sprite_template:
    post:
      consumes:
      - application/json
      parameters:
      - description: Pokemon ID
        in: path
        name: id
        required: true
