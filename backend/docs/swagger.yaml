      gradient_stops:
        items:
          $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.GradientStop'
        type: array
      outline_color:
        type: string
      outline_gradient_angle:
        type: integer
      outline_gradient_stops:
        items:
          $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.GradientStop'
        type: array
      outline_type:
        description: '"none" | "solid"'
        type: string
      outline_width:
        type: integer
      text_align:
        type: string
      text_shadow:
        type: boolean
      text_shadow_blur:
        type: integer
      text_shadow_color:
