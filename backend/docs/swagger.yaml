basePath: /api
definitions:
  github_com_zsleyer_encounty_backend_internal_database.EncounterStats:
    properties:
      first_at:
        type: string
      last_at:
        type: string
      rate_per_hour:
        type: number
      today:
        type: integer
      total:
        type: integer
    type: object
  github_com_zsleyer_encounty_backend_internal_database.OverviewStats:
    properties:
      today:
        type: integer
      total_encounters:
        type: integer
      total_pokemon:
        type: integer
    type: object
  github_com_zsleyer_encounty_backend_internal_detector.CameraInfo:
    properties:
      device_path:
        type: string
      driver:
        type: string
      name:
        type: string
    type: object
  github_com_zsleyer_encounty_backend_internal_detector.Capabilities:
    properties:
      display_server:
        type: string
      platform:
        type: string
      sidecar_available:
        type: boolean
      supports_camera:
        type: boolean
      supports_screen_capture:
        type: boolean
      supports_window_capture:
        type: boolean
    type: object
  github_com_zsleyer_encounty_backend_internal_licenses.Entry:
    properties:
      license:
        type: string
      name:
        type: string
      source:
        type: string
      text:
        type: string
      version:
        type: string
    type: object
  github_com_zsleyer_encounty_backend_internal_state.AppState:
    properties:
      active_id:
        type: string
      data_path:
        type: string
      hotkeys:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.HotkeyMap'
      license_accepted:
        type: boolean
      pokemon:
        items:
          $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.Pokemon'
        type: array
      sessions:
        items:
          $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.Session'
        type: array
      settings:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.Settings'
    type: object
  github_com_zsleyer_encounty_backend_internal_state.CounterElement:
    properties:
      height:
        type: integer
      idle_animation:
        type: string
      label_style:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.TextStyle'
      label_text:
        type: string
      show_label:
        type: boolean
      style:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.TextStyle'
      trigger_enter:
        type: string
      visible:
        type: boolean
      width:
        type: integer
      x:
        type: integer
      "y":
        type: integer
      z_index:
        type: integer
    type: object
  github_com_zsleyer_encounty_backend_internal_state.DetectionLogEntry:
    properties:
      at:
        description: At is the UTC timestamp when the match was confirmed.
        type: string
      confidence:
        description: Confidence is the NCC score that triggered the match (0.0–1.0).
        type: number
    type: object
  github_com_zsleyer_encounty_backend_internal_state.DetectorConfig:
    properties:
      adaptive_cooldown:
        type: boolean
      adaptive_cooldown_min:
        description: Minimum seconds, default 3
        type: integer
      change_threshold:
        description: pixel-delta fraction required to leave MATCH state
        type: number
      consecutive_hits:
        description: consecutive matching frames required before counting
        type: integer
      cooldown_sec:
        description: minimum seconds between counts
        type: integer
      detection_log:
        description: last maxDetectionLog confirmed matches
        items:
          $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.DetectionLogEntry'
        type: array
      enabled:
        type: boolean
      max_poll_ms:
        description: slowest adaptive poll interval (static screen), default 500
        type: integer
      min_poll_ms:
        description: fastest adaptive poll interval (high activity), default 30
        type: integer
      poll_interval_ms:
        description: base milliseconds between capture polls (adaptive centre point)
        type: integer
      precision:
        description: 0.0–1.0, default 0.85
        type: number
      region:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.DetectorRect'
      relative_regions:
        type: boolean
      source_type:
        description: '"screen_region" | "window" | "browser_camera" | "browser_display"'
        type: string
      templates:
        description: replaces TemplatePaths
        items:
          $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.DetectorTemplate'
        type: array
      window_title:
        type: string
    type: object
  github_com_zsleyer_encounty_backend_internal_state.DetectorRect:
    properties:
      h:
        type: integer
      w:
        type: integer
      x:
        type: integer
      "y":
        type: integer
    type: object
  github_com_zsleyer_encounty_backend_internal_state.DetectorTemplate:
    properties:
      enabled:
        description: nil = true (backward compat)
        type: boolean
      image_path:
        description: legacy filesystem path
        type: string
      regions:
        items:
          $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.MatchedRegion'
        type: array
      template_db_id:
        description: DB primary key
        type: integer
    type: object
  github_com_zsleyer_encounty_backend_internal_state.GradientStop:
    properties:
      color:
        type: string
      position:
        type: number
    type: object
  github_com_zsleyer_encounty_backend_internal_state.HotkeyMap:
    properties:
      decrement:
        type: string
      increment:
        type: string
      next_pokemon:
        type: string
      reset:
        type: string
    type: object
  github_com_zsleyer_encounty_backend_internal_state.HuntTypePreset:
    properties:
      defaultConsecutiveHits:
        description: DefaultConsecutiveHits is the recommended number of matching
          frames before counting.
        type: integer
      defaultCooldownSec:
        description: DefaultCooldownSec is the recommended minimum seconds between
          counted encounters.
        type: integer
      key:
        description: Key is the canonical identifier stored in Pokemon.HuntType.
        type: string
      nameDE:
        description: NameDE is the German display name.
        type: string
      nameEN:
        description: NameEN is the English display name.
        type: string
      oddsDenom:
        type: integer
      oddsNumer:
        description: OddsNumer and OddsDenom express the base shiny probability as
          a fraction.
        type: integer
      templateTip:
        description: TemplateTip is an English hint shown to the user when capturing
          a template.
        type: string
    type: object
  github_com_zsleyer_encounty_backend_internal_state.MatchedRegion:
    properties:
      expected_text:
        description: used if Type == "text"
        type: string
      rect:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.DetectorRect'
      type:
        description: '"image" | "text"'
        type: string
    type: object
  github_com_zsleyer_encounty_backend_internal_state.NameElement:
    properties:
      height:
        type: integer
      idle_animation:
        type: string
      style:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.TextStyle'
      trigger_enter:
        type: string
      visible:
        type: boolean
      width:
        type: integer
      x:
        type: integer
      "y":
        type: integer
      z_index:
        type: integer
    type: object
  github_com_zsleyer_encounty_backend_internal_state.OverlaySettings:
    properties:
      background_animation:
        type: string
      background_animation_speed:
        type: number
      background_color:
        type: string
      background_image:
        type: string
      background_image_fit:
        type: string
      background_opacity:
        type: number
      blur:
        type: integer
      border_color:
        type: string
      border_radius:
        type: integer
      border_width:
        type: integer
      canvas_height:
        type: integer
      canvas_width:
        type: integer
      counter:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.CounterElement'
      hidden:
        type: boolean
      name:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.NameElement'
      show_border:
        type: boolean
      sprite:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.SpriteElement'
      title:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.TitleElement'
    type: object
  github_com_zsleyer_encounty_backend_internal_state.Pokemon:
    properties:
      canonical_name:
        description: English PokéAPI slug
        type: string
      completed_at:
        type: string
      created_at:
        type: string
      detector_config:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.DetectorConfig'
      encounters:
        type: integer
      game:
        description: key from games.json
        type: string
      hunt_mode:
        description: '"both" | "timer" | "detector" (default "both")'
        type: string
      hunt_type:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      language:
        description: '"de" | "en"'
        type: string
      name:
        description: Display name (localized)
        type: string
      overlay:
        allOf:
        - $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.OverlaySettings'
        description: Pokemon-specific overlay settings
      overlay_mode:
        description: '"default" | "custom" | "linked:<pokemon-id>"'
        type: string
      sprite_style:
        description: '"classic" | "animated" | "3d" | "artwork"'
        type: string
      sprite_type:
        description: '"normal" | "shiny"'
        type: string
      sprite_url:
        type: string
      step:
        description: Increment/decrement step size (default 1)
        type: integer
      timer_accumulated_ms:
        type: integer
      timer_started_at:
        type: string
      title:
        description: User-defined custom title
        type: string
    type: object
  github_com_zsleyer_encounty_backend_internal_state.Session:
    properties:
      encounters:
        type: integer
      ended_at:
        type: string
      id:
        type: string
      pokemon_id:
        type: string
      started_at:
        type: string
    type: object
  github_com_zsleyer_encounty_backend_internal_state.Settings:
    properties:
      auto_save:
        type: boolean
      browser_port:
        type: integer
      config_path:
        description: custom data directory override
        type: string
      crisp_sprites:
        type: boolean
      languages:
        description: active game-name languages; default ["de","en"]
        items:
          type: string
        type: array
      output_dir:
        type: string
      output_enabled:
        type: boolean
      overlay:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.OverlaySettings'
      tutorial_seen:
        $ref: '#/definitions/github_com_zsleyer_encounty_backend_internal_state.TutorialFlags'
      ui_animations:
