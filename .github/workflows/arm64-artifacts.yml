name: arm64 build artifacts

# Test-only build of the arm64 packages for Linux and Windows. Pushes to the arm64
# feature branch (or a manual dispatch) produce downloadable workflow artifacts instead
# of a release, so both arches can be verified before the changes reach main.
on:
  push:
    branches:
      - feature/arm64
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-arm64:
    name: Linux arm64 (AppImage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set dev version
        run: echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Frontend
        working-directory: frontend
        run: |
          yarn install
          npm pkg set version="0.0.0"
          yarn build

      - name: Generate Icons
        working-directory: backend
        run: go run ../scripts/generate_icons.go

      - name: Build Linux Binary (arm64)
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          mkdir -p ./frontend
          cp -r ../frontend/dist ./frontend/
          go build -ldflags="-s -w -X main.version=$VERSION -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%d.%m.%y)" -o ../encounty-backend-linux main.go
          rm -rf ./frontend

      - name: Build Electron
        working-directory: electron
        run: |
          yarn install
          npm pkg set version="0.0.0"
          yarn build

      - name: Package Electron Linux (arm64)
        working-directory: electron
        run: yarn package:linux --arm64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: encounty-linux-arm64
          if-no-files-found: error
          path: electron/release/Encounty-arm64.AppImage

  windows-arm64:
    name: Windows arm64 (installer + portable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Install Wine for Windows cross-build
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Set dev version
        run: |
          echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "WIN_VER=0.0.0" >> $GITHUB_ENV

      - name: Build Frontend
        working-directory: frontend
        run: |
          yarn install
          npm pkg set version="0.0.0"
          yarn build

      - name: Generate Icons
        working-directory: backend
        run: go run ../scripts/generate_icons.go

      - name: Build Windows Binary (arm64)
        working-directory: backend
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: |
          sed -i "s/0\.2\.0\.0/${WIN_VER}.0/g" winres/winres.json
          $(go env GOPATH)/bin/go-winres make --product-version "${WIN_VER}.0" --file-version "${WIN_VER}.0"
          mkdir -p ./frontend
          cp -r ../frontend/dist ./frontend/
          go build -ldflags="-s -w -X main.version=$VERSION -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%d.%m.%y) -H=windowsgui" -o ../encounty-backend-windows.exe main.go
          rm -rf ./frontend
          rm -f *.syso

      - name: Build Electron
        working-directory: electron
        run: |
          yarn install
          npm pkg set version="0.0.0"
          yarn build

      - name: Package Electron Windows (arm64)
        working-directory: electron
        env:
          # Disable the 7z ARM64 branch filter that the NSIS install stub cannot unpack
          # (otherwise the installed exe and native DLLs are silently skipped).
          ELECTRON_BUILDER_7ZIP_PATH: ${{ github.workspace }}/scripts/7za-nofilter.sh
        run: yarn package:win --arm64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: encounty-win-arm64
          if-no-files-found: error
          path: |
            electron/release/Encounty-arm64.exe
            electron/release/Encounty-Setup-arm64.exe
