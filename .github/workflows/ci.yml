name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  build:
    name: Build
    needs: [test, lint]
    uses: ./.github/workflows/build.yml

  badges:
    name: Coverage Badges
    needs: [test]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/badges.yml
    permissions:
      contents: write
    with:
      backend-coverage: ${{ needs.test.outputs.backend-coverage }}
      frontend-coverage: ${{ needs.test.outputs.frontend-coverage }}
