name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version from tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=$(echo "$TAG_VERSION" | sed 's/^v//')
          if [[ "$CLEAN_VERSION" != *.*.* ]]; then
            CLEAN_VERSION="${CLEAN_VERSION}.0"
          fi
          echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: yarn install

      - name: Set Frontend Version
        working-directory: frontend
        run: npm pkg set version="$CLEAN_VERSION"

      - name: Build Frontend
        working-directory: frontend
        run: yarn build

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Icons
        run: |
          cd backend
          go run ../scripts/generate_icons.go

      - name: Build Linux Binary
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p ./frontend
          cp -r ../frontend/dist ./frontend/
          go build -ldflags="-s -w -X main.version=$VERSION -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%d.%m.%y)" -o ../encounty-backend-linux main.go
          rm -rf ./frontend

      - name: Set Windows resource version
        working-directory: backend
        run: |
          WIN_VER=$(echo "$CLEAN_VERSION" | awk -F. '{if(NF==2) print $0".0"; else print $0}')
          echo "WIN_VER=$WIN_VER" >> $GITHUB_ENV
          sed -i "s/0\.2\.0\.0/${WIN_VER}.0/g" winres/winres.json

      - name: Build Windows Binary
        working-directory: backend
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          $(go env GOPATH)/bin/go-winres make --product-version "${WIN_VER}.0" --file-version "${WIN_VER}.0"
          mkdir -p ./frontend
          cp -r ../frontend/dist ./frontend/
          go build -ldflags="-s -w -X main.version=$VERSION -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%d.%m.%y) -H=windowsgui" -o ../encounty-backend-windows.exe main.go
          rm -rf ./frontend
          rm -f *.syso

      - name: Build Electron
        working-directory: electron
        run: |
          yarn install
          npm pkg set version="$CLEAN_VERSION"
          yarn build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-pre') }}

      - name: Package & Publish Electron Linux
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn package:linux --publish always

      - name: Install Wine for Windows cross-build
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Package & Publish Electron Windows
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn package:win --publish always
