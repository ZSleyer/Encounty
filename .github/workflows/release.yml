name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version from tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=$(echo "$TAG_VERSION" | sed 's/^v//' | sed 's/-.*//')
          if [[ "$CLEAN_VERSION" != *.*.* ]]; then
            CLEAN_VERSION="${CLEAN_VERSION}.0"
          fi
          echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: yarn install

      - name: Set Frontend Version
        working-directory: frontend
        run: npm pkg set version="$CLEAN_VERSION"

      - name: Build Frontend
        working-directory: frontend
        run: yarn build

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Icons
        run: |
          cd backend
          go run ../scripts/generate_icons.go

      - name: Build Linux Binary
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p ./frontend
          cp -r ../frontend/dist ./frontend/
          go build -ldflags="-s -w -X main.version=$VERSION -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%d.%m.%y)" -o ../encounty-backend-linux main.go
          rm -rf ./frontend

      - name: Set Windows resource version
        working-directory: backend
        run: |
          WIN_VER=$(echo "$CLEAN_VERSION" | awk -F. '{if(NF==2) print $0".0"; else print $0}')
          echo "WIN_VER=$WIN_VER" >> $GITHUB_ENV
          sed -i "s/0\.2\.0\.0/${WIN_VER}.0/g" winres/winres.json

      - name: Build Windows Binary
        working-directory: backend
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          $(go env GOPATH)/bin/go-winres make --product-version "${WIN_VER}.0" --file-version "${WIN_VER}.0"
          mkdir -p ./frontend
          cp -r ../frontend/dist ./frontend/
          go build -ldflags="-s -w -X main.version=$VERSION -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%d.%m.%y) -H=windowsgui" -o ../encounty-backend-windows.exe main.go
          rm -rf ./frontend
          rm -f *.syso

      - name: Build Electron
        working-directory: electron
        run: |
          yarn install
          npm pkg set version="$CLEAN_VERSION"
          yarn build

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "$GITHUB_REF" == *"-pre"* ]] || [[ "$GITHUB_REF" == *"-rc"* ]] || [[ "$GITHUB_REF" == *"-alpha"* ]] || [[ "$GITHUB_REF" == *"-beta"* ]]; then
            echo "is_pre=true" >> $GITHUB_OUTPUT
            echo "publish_flag=never" >> $GITHUB_OUTPUT
          else
            echo "is_pre=false" >> $GITHUB_OUTPUT
            echo "publish_flag=always" >> $GITHUB_OUTPUT
          fi

      - name: Delete existing pre-release (overwrite mode)
        if: steps.prerelease.outputs.is_pre == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || true

      - name: Recreate tag at current commit (pre-release overwrite)
        if: steps.prerelease.outputs.is_pre == 'true'
        run: |
          git tag -f "$VERSION"
          git push origin "$VERSION" --force

      - name: Build pre-release body
        if: steps.prerelease.outputs.is_pre == 'true'
        id: prebody
        run: |
          EOF_MARKER=$(openssl rand -hex 8)
          echo "body<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "> **Note:** Pre-releases are overwritten on every build. Compare the commit hash to check if you have the latest version." >> "$GITHUB_OUTPUT"
          echo ">" >> "$GITHUB_OUTPUT"
          echo "> Commit: \`${GITHUB_SHA::7}\`" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Extract annotated tag message
        if: steps.prerelease.outputs.is_pre != 'true'
        id: tagmsg
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "$VERSION")
          if [ -n "$TAG_MSG" ]; then
            EOF_MARKER=$(openssl rand -hex 8)
            echo "body<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo "has_body=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: ${{ steps.tagmsg.outputs.has_body != 'true' }}
          prerelease: ${{ steps.prerelease.outputs.is_pre == 'true' }}
          body: ${{ steps.prebody.outputs.body || steps.tagmsg.outputs.body || '' }}

      - name: Package & Publish Electron Linux
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn package:linux --publish ${{ steps.prerelease.outputs.publish_flag }}

      - name: Install Wine for Windows cross-build
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Package & Publish Electron Windows
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn package:win --publish ${{ steps.prerelease.outputs.publish_flag }}

      - name: Upload Electron artifacts to pre-release
        if: steps.prerelease.outputs.is_pre == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/release/Encounty.AppImage
            electron/release/Encounty.exe

  release-macos:
    name: Build & Publish macOS
    runs-on: macos-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version from tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=$(echo "$TAG_VERSION" | sed 's/^v//' | sed 's/-.*//')
          if [[ "$CLEAN_VERSION" != *.*.* ]]; then
            CLEAN_VERSION="${CLEAN_VERSION}.0"
          fi
          echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "$GITHUB_REF" == *"-pre"* ]] || [[ "$GITHUB_REF" == *"-rc"* ]] || [[ "$GITHUB_REF" == *"-alpha"* ]] || [[ "$GITHUB_REF" == *"-beta"* ]]; then
            echo "publish_flag=never" >> $GITHUB_OUTPUT
          else
            echo "publish_flag=always" >> $GITHUB_OUTPUT
          fi

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: yarn install

      - name: Set Frontend Version
        working-directory: frontend
        run: npm pkg set version="$CLEAN_VERSION"

      - name: Build Frontend
        working-directory: frontend
        run: yarn build

      - name: Generate Icons
        run: |
          cd backend
          go run ../scripts/generate_icons.go

      - name: Generate macOS ICNS
        run: |
          mkdir -p electron/build/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size frontend/public/app-icon.png --out "electron/build/icon.iconset/icon_${size}x${size}.png"
          done
          for size in 16 32 128 256; do
            double=$((size*2))
            sips -z $double $double frontend/public/app-icon.png --out "electron/build/icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns electron/build/icon.iconset -o electron/build/icon.icns
          rm -rf electron/build/icon.iconset

      - name: Build macOS Binary
        working-directory: backend
        env:
          CGO_ENABLED: '1'
          GOOS: darwin
          GOARCH: arm64
        run: |
          mkdir -p ./frontend
          cp -r ../frontend/dist ./frontend/
          go build -ldflags="-s -w -X main.version=$VERSION -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%d.%m.%y)" -o ../encounty-backend-darwin main.go
          rm -rf ./frontend

      - name: Build & Publish Electron macOS
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn install
          npm pkg set version="$CLEAN_VERSION"
          yarn build
          yarn package:mac --publish always
