name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test Backend
        working-directory: backend
        run: go test ./internal/... -count=1

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: yarn install

      - name: Test Frontend
        working-directory: frontend
        run: yarn test --run

  build:
    name: Build Go Binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: encounty-linux
          - goos: windows
            goarch: amd64
            output: encounty-windows.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version from tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=$(echo "$TAG_VERSION" | sed 's/^v//')
          if [[ "$CLEAN_VERSION" != *.*.* ]]; then
            CLEAN_VERSION="${CLEAN_VERSION}.0"
          fi
          echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Build Frontend
        working-directory: frontend
        run: |
          yarn install
          npm pkg set version="$CLEAN_VERSION"
          yarn build

      - name: Install go-winres
        if: matrix.goos == 'windows'
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Icons
        run: |
          cd backend
          go run ../scripts/generate_icons.go

      - name: Generate Windows Resources
        if: matrix.goos == 'windows'
        run: |
          cd backend
          WIN_VER=$(echo "$CLEAN_VERSION" | awk -F. '{if(NF==2) print $0".0"; else print $0}')
          $(go env GOPATH)/bin/go-winres make --product-version "${WIN_VER}.0" --file-version "${WIN_VER}.0"

      - name: Build Binary
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p ./frontend
          cp -r ../frontend/dist ./frontend/

          if [[ "$GOOS" == "windows" ]]; then
            LDFLAGS="-s -w -X main.version=$VERSION -X main.buildDate=$(date -u +%d.%m.%y) -H=windowsgui"
          else
            LDFLAGS="-s -w -X main.version=$VERSION -X main.buildDate=$(date -u +%d.%m.%y)"
          fi

          go build -ldflags="$LDFLAGS" -o ../${{ matrix.output }} main.go

          rm -rf ./frontend
          rm -f *.syso

      - name: Compress with UPX
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y upx
          upx --best --lzma ${{ matrix.output }} || echo "UPX failed, continuing..."

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  package-electron:
    name: Package Electron Apps
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download Binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Binaries
        shell: bash
        run: |
          find artifacts -type f -exec mv {} . \;
          ls -lah

      - name: Set version from tag
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=$(echo "$TAG_VERSION" | sed 's/^v//')
          if [[ "$CLEAN_VERSION" != *.*.* ]]; then
            CLEAN_VERSION="${CLEAN_VERSION}.0"
          fi
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Build Frontend
        working-directory: frontend
        run: |
          yarn install
          npm pkg set version="$CLEAN_VERSION"
          yarn build

      - name: Build Electron
        working-directory: electron
        run: |
          yarn install
          npm pkg set version="$CLEAN_VERSION"
          yarn build

      - name: Package Electron
        working-directory: electron
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.target }}" = "linux" ]; then
            yarn package:linux
          else
            yarn package:win
          fi

      - name: Upload Electron Packages
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.target }}
          path: electron/release/*

  release:
    name: Create Release
    needs: [build, package-electron]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          rm -f release-assets/*.blockmap
          ls -lah release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
