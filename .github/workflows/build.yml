name: Build

on:
  workflow_call:

jobs:
  verify:
    name: Verify Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        working-directory: frontend
        run: |
          yarn install
          yarn build

      - name: Build Backend (Linux)
        run: make build-linux

      - name: Build Electron
        working-directory: electron
        run: |
          yarn install
          yarn build

      - name: Verify Artifacts
        run: |
          test -f encounty-linux || (echo "Backend binary not found" && exit 1)
          test -d frontend/dist || (echo "Frontend dist not found" && exit 1)
          test -d electron/dist || (echo "Electron dist not found" && exit 1)
          echo "All artifacts verified"
