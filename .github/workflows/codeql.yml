name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly disclosed query updates catch dormant code.
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Guard against the runaway autobuild that stalled the previous default
    # setup for six hours; a real analysis finishes in minutes.
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Go cannot use build-mode none; the manual build below is a plain
          # `go build` (far cheaper than autobuild's incremental analysis that
          # stalled the default setup) after stubbing the go:embed dist dir.
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Go
        if: matrix.language == 'go'
        working-directory: backend
        run: |
          # frontend/dist is go:embed-ed; a stub lets the build compile in CI.
          mkdir -p frontend/dist && touch frontend/dist/.gitkeep
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
