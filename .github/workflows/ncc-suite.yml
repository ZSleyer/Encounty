# Runs the NCC detection quality suite against the real gameplay fixtures.
#
# The fixtures (game footage) live as release assets in the private repo
# ZSleyer/encounty-test-fixtures and cannot be published with the code, so
# this workflow needs the FIXTURES_TOKEN secret (a fine-grained PAT with read
# access to that repo's contents). Without the secret the job skips cleanly,
# which also covers forks and external pull requests.
name: NCC Quality Suite

on:
  workflow_dispatch:
  schedule:
    # Weekly sanity run (Mondays 04:30 UTC); releases should trigger it manually.
    - cron: "30 4 * * 1"

permissions:
  contents: write

concurrency:
  group: ncc-suite
  cancel-in-progress: true

jobs:
  ncc:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FIXTURES_TOKEN: ${{ secrets.FIXTURES_TOKEN }}
    steps:
      - name: Check fixtures token
        id: gate
        run: |
          if [ -n "$FIXTURES_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "FIXTURES_TOKEN not set; skipping the NCC suite." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v5

      - name: Setup Node
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install ffmpeg
        if: steps.gate.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Restore fixtures cache
        if: steps.gate.outputs.enabled == 'true'
        id: fixtures-cache
        uses: actions/cache@v6
        with:
          path: frontend/src/engine/__tests__/fixtures
          key: ncc-fixtures-v2

      - name: Download fixtures
        if: steps.gate.outputs.enabled == 'true' && steps.fixtures-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.FIXTURES_TOKEN }}
        run: |
          mkdir -p frontend/src/engine/__tests__/fixtures
          gh release download fixtures-v2 \
            --repo ZSleyer/encounty-test-fixtures \
            --dir frontend/src/engine/__tests__/fixtures

      - name: Run NCC quality suite
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        env:
          NCC_RESULTS_PATH: ${{ github.workspace }}/site/public/testing-results.json
        run: |
          export NCC_APP_VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo dev)"
          yarn test:ncc

      # Publish the results to the website: committing via the GraphQL
      # createCommitOnBranch mutation keeps the commit signed (GitHub signs
      # bot commits made through the API). The push touches site/**, which
      # triggers the Pages deploy, so the public testing page always shows
      # the latest suite run. Skipped when the numbers did not change.
      - name: Publish results to the testing page
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE=site/public/testing-results.json
          if git ls-files --error-unmatch "$FILE" >/dev/null 2>&1 && git diff --quiet -- "$FILE"; then
            echo "No result changes; skipping publish." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          gh api graphql \
            -f query='mutation($input: CreateCommitOnBranchInput!) {
              createCommitOnBranch(input: $input) { commit { oid } }
            }' \
            -F "input[branch][repositoryNameWithOwner]=${GITHUB_REPOSITORY}" \
            -F "input[branch][branchName]=${GITHUB_REF_NAME}" \
            -F "input[expectedHeadOid]=$(git rev-parse HEAD)" \
            -F "input[message][headline]=chore(site): update testing results from ncc suite run" \
            -F "input[fileChanges][additions][][path]=$FILE" \
            -F "input[fileChanges][additions][][contents]=$(base64 -w0 "$FILE")"
