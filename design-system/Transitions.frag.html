<h2 class="card-title">Motion / Micro Transitions (150-240ms, gated by reduce-motion)</h2>
<div class="col">
  <div class="row">
    <button class="btn btn-secondary" onclick="replay('r1','anim-reveal')">Replay t-reveal</button>
    <button class="btn btn-secondary" onclick="replay('r2','anim-flicker')">Replay t-flicker-in</button>
  </div>
  <div id="r1" class="t-panel anim-reveal">
    <span class="t-label t-label--accent">t-reveal</span>
    <p style="color:var(--text-secondary); margin:8px 0 0;">Clip-path wipe + slide + fade, 240ms, cubic-bezier(.7,0,.2,1), richtungsabhaengig (ltr/rtl je nach Nav-Richtung). Route mounts.</p>
  </div>
  <div id="r2" class="t-panel anim-flicker">
    <span class="t-label t-label--accent">t-flicker-in</span>
    <p style="color:var(--text-secondary); margin:8px 0 0;">3-step opacity flicker, 150ms. Modals and overlays.</p>
  </div>
</div>
<script>
function replay(id, cls) {
  const el = document.getElementById(id);
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
}
</script>
