<h2 class="card-title">Accent Presets / dark + light</h2>
<div class="grid" style="grid-template-columns: repeat(4, 1fr);">
  <div class="col">
    <span class="t-label">Acid (default)</span>
    <div class="swatch" style="background:#0d1117;"><div class="name" style="color:#c8e04a;">■ #c8e04a</div><div class="hex">12.8:1 dark</div></div>
    <div class="swatch t-light" style="background:#ffffff;"><div class="name" style="color:#566800;">■ #566800</div><div class="hex">6.2:1 light</div></div>
  </div>
  <div class="col">
    <span class="t-label">Crimson</span>
    <div class="swatch" style="background:#0d1117;"><div class="name" style="color:#f0507a;">■ #f0507a</div><div class="hex">5.5:1 dark</div></div>
    <div class="swatch t-light" style="background:#ffffff;"><div class="name" style="color:#b8144a;">■ #b8144a</div><div class="hex">6.5:1 light</div></div>
  </div>
  <div class="col">
    <span class="t-label">Cyan</span>
    <div class="swatch" style="background:#0d1117;"><div class="name" style="color:#3fd4e0;">■ #3fd4e0</div><div class="hex">10.6:1 dark</div></div>
    <div class="swatch t-light" style="background:#ffffff;"><div class="name" style="color:#0e7490;">■ #0e7490</div><div class="hex">5.4:1 light</div></div>
  </div>
  <div class="col">
    <span class="t-label">Violet</span>
    <div class="swatch" style="background:#0d1117;"><div class="name" style="color:#a685f0;">■ #a685f0</div><div class="hex">6.5:1 dark</div></div>
    <div class="swatch t-light" style="background:#ffffff;"><div class="name" style="color:#6d28d9;">■ #6d28d9</div><div class="hex">7.1:1 light</div></div>
  </div>
</div>
<div class="row" style="margin-top:20px;">
  <button class="btn btn-primary" style="background:#c8e04a; color:#0d1117;">Acid</button>
  <button class="btn btn-primary" style="background:#f0507a; color:#0d1117;">Crimson</button>
  <button class="btn btn-primary" style="background:#3fd4e0; color:#0d1117;">Cyan</button>
  <button class="btn btn-primary" style="background:#a685f0; color:#0d1117;">Violet</button>
</div>
