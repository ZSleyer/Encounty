<style>
.t-rail {
  display: inline-flex; flex-direction: column; gap: 4px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle); border-radius: 0;
  padding: 6px;
}
.t-canvas {
  flex: 1; min-width: 260px; height: 190px;
  border: 1px solid var(--border-subtle); border-radius: 0;
  background:
    repeating-conic-gradient(color-mix(in srgb, var(--text-primary) 5%, transparent) 0% 25%, transparent 0% 50%) 0 0 / 16px 16px;
  position: relative;
}
.t-sel {
  position: absolute; top: 40px; left: 40px; width: 120px; height: 90px;
  border: 1px solid var(--accent-blue);
}
.t-sel i {
  position: absolute; width: 8px; height: 8px;
  background: var(--accent-blue); border: 1px solid var(--bg-primary);
}
.t-layer {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: 0; font-size: 13px;
  border: 1px solid transparent; max-width: 260px;
}
.t-layer.active {
  background: color-mix(in srgb, var(--accent-blue) 12%, var(--bg-card));
  border-color: color-mix(in srgb, var(--accent-blue) 40%, var(--border-subtle));
}
.t-layer .nm { flex: 1; }
.t-layer .icon-btn { width: 24px; height: 24px; }
</style>
<h2 class="card-title">Editor / Tool Rail, Canvas, Layers</h2>
<div class="row" style="align-items: flex-start;">
  <div class="t-rail" role="toolbar" aria-label="Werkzeuge" aria-orientation="vertical">
    <button class="icon-btn active" aria-pressed="true" aria-label="Auswählen"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z" transform="rotate(-45 12 12)"/></svg></button>
    <button class="icon-btn" aria-label="Zoom"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg></button>
    <button class="icon-btn" aria-label="Raster"><svg class="icon icon-sm" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg></button>
    <button class="icon-btn" aria-label="Element hinzufügen"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
  </div>
  <div class="t-canvas" aria-label="Canvas mit Transparenz-Schachbrett">
    <div class="t-sel" aria-label="Selektion mit Handles">
      <i style="top: -4px; left: -4px;"></i><i style="top: -4px; right: -4px;"></i>
      <i style="bottom: -4px; left: -4px;"></i><i style="bottom: -4px; right: -4px;"></i>
      <i style="top: -4px; left: calc(50% - 4px);"></i><i style="bottom: -4px; left: calc(50% - 4px);"></i>
    </div>
  </div>
  <div class="col" style="gap: 4px;">
    <span class="t-label" style="margin-bottom: 4px;">Ebenen</span>
    <div class="t-layer active"><span class="nm">Sprite</span>
      <button class="icon-btn" aria-label="Nach oben"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m6 15 6-6 6 6"/></svg></button>
      <button class="icon-btn" aria-label="Sichtbar"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <div class="t-layer"><span class="nm">Name</span>
      <button class="icon-btn" aria-label="Nach oben"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m6 15 6-6 6 6"/></svg></button>
      <button class="icon-btn" aria-label="Sichtbar"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <div class="t-layer" style="color: var(--text-muted);"><span class="nm">Titel</span>
      <button class="icon-btn" aria-label="Nach oben"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m6 15 6-6 6 6"/></svg></button>
      <button class="icon-btn" aria-label="Ausgeblendet"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg></button>
    </div>
  </div>
</div>
