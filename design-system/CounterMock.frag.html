<h2 class="card-title">Demo / Hunt Counter Panel (Encounter Tab, revised)</h2>

<!-- Hero identity (large full sprite + name) sits OUTSIDE and ABOVE the
     panel; the panel keeps its original elements/positions but loses the
     small internal identity row, now redundant. -->
<div class="col" style="gap:0; align-items:center; width:min(100%, clamp(480px, 46vw, 680px));">
  <div class="col" style="align-items:center; gap:2px; margin-bottom:12px;">
    <div style="width:140px; height:140px; display:flex; align-items:center; justify-content:center; color:var(--text-faint);">
      <svg viewBox="0 0 24 24" width="104" height="104" fill="none" stroke="currentColor" stroke-width="1.1"><circle cx="12" cy="12" r="9.3"/><path d="M2.7 12h6.6M14.7 12h6.6"/><circle cx="12" cy="12" r="2.4"/></svg>
    </div>
    <div style="font-size:34px; font-weight:800; color:var(--text-primary); line-height:1.1; text-align:center;">Ralts</div>
    <div style="color:var(--text-muted); font-size:13px;">Emerald · Route 102</div>
  </div>

  <div class="t-panel hatch" style="width:100%; padding:24px;">
    <div class="row" style="justify-content:space-between;">
      <span class="t-label t-label--accent">Active Hunt</span>
      <span class="t-label">02:41:07</span>
    </div>

    <!-- No thousands separator: digit gaps stay uniform; tabular-nums keeps
         them equal. Edit pencil restored to its original absolute
         top-right slot (unchanged position) but no longer hover-gated. -->
    <div class="row" style="position:relative; justify-content:center; margin:22px 0 14px;">
      <div style="font-size:clamp(48px, 5vw, 80px); font-weight:700; text-align:center; font-variant-numeric:tabular-nums; line-height:1;">1024</div>
      <button class="icon-btn" title="Set encounters" aria-label="Set encounters" style="position:absolute; top:0; right:0;">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>
      </button>
    </div>

    <div class="row" style="justify-content:center; gap:8px;">
      <span class="t-label t-label--accent">Odds 1/512</span>
    </div>

    <div class="row" style="margin-top:20px; justify-content:center; gap:8px;">
      <button class="btn btn-secondary" style="width:44px; height:44px; padding:0; display:flex; align-items:center; justify-content:center;" title="−1">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
      </button>
      <button class="btn btn-primary t-cut" style="min-width:128px; height:44px; display:flex; align-items:center; justify-content:center;" title="+1">
        <svg class="icon" viewBox="0 0 24 24" style="stroke-width:2.5;"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="btn btn-ghost" style="width:44px; height:44px; padding:0; display:flex; align-items:center; justify-content:center;" title="Reset">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>
  </div>
</div>
