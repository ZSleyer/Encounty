<h2 class="card-title">Controls / Buttons, Inputs, Toggle</h2>
<div class="col">
  <div class="row">
    <button class="btn btn-primary t-cut">Caught!</button>
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-danger">Delete</button>
  </div>
  <div class="row">
    <div style="flex:1; min-width:200px;"><input class="t-input" placeholder="Search hunts…" /></div>
    <div class="t-toggle" role="switch" aria-checked="true" tabindex="0" aria-label="Toggle on"></div>
    <div class="t-toggle" role="switch" aria-checked="false" tabindex="0" aria-label="Toggle off"></div>
  </div>
  <div class="t-light surface" style="margin:8px -24px -24px; padding:16px 24px; border-top:1px solid var(--border-subtle);">
    <div class="row">
      <button class="btn btn-primary t-cut">Caught!</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-ghost">Ghost</button>
      <div style="flex:1; min-width:160px;"><input class="t-input" placeholder="Light input" /></div>
      <div class="t-toggle" role="switch" aria-checked="true" tabindex="0" aria-label="Toggle on light"></div>
    </div>
  </div>
</div>
